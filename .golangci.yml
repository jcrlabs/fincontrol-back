version: "2"

linters:
  enable:
    - errcheck
    - govet
    - staticcheck
    - unused
    - gosimple
    - ineffassign
    - typecheck
    - gofmt
    - gosec
    - noctx

linters-settings:
  gosec:
    excludes:
      - G115  # integer overflow on conversion (false positives with pagination)

issues:
  exclude-rules:
    - path: _test\.go
      linters:
        - errcheck
        - gosec
