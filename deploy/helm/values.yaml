replicaCount: 2

image:
  repository: ghcr.io/jcrlabs/fincontrol-back
  pullPolicy: IfNotPresent
  tag: ""
  pullSecretName: ghcr-pull-secret

service:
  type: ClusterIP
  port: 8080

ingress:
  enabled: true
  className: nginx
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-cloudflare
  host: ""
  tls: true

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi

hpa:
  minReplicas: 2
  maxReplicas: 5
  targetCPUUtilizationPercentage: 70

config:
  env: production
  dbHost: postgres-fincontrol
  dbPort: "5432"
  dbName: fincontrol
  dbSslMode: disable
  corsOrigin: https://fincontrol.jcrlabs.net

secretName: fincontrol-back-secrets

postgres:
  image: postgres:17-alpine
  storage: 10Gi
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi
