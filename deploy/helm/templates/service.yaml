apiVersion: v1
kind: Service
metadata:
  name: {{ include "fincontrol-back.fullname" . }}
  labels:
    {{- include "fincontrol-back.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  selector:
    {{- include "fincontrol-back.selectorLabels" . | nindent 4 }}
  ports:
    - protocol: TCP
      port: {{ .Values.service.port }}
      targetPort: 8080
